version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: litverse-postgres
    environment:
      POSTGRES_USER: litverse_user
      POSTGRES_PASSWORD: litverse_password
      POSTGRES_DB: litverse_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
